<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>{{APP_NAME}} 内测安装</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, sans-serif;
      background: #f2f2f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 360px;
      width: 100%;
      text-align: center;
      box-shadow: 0 2px 20px rgba(0,0,0,0.08);
    }
    .icon {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, #007AFF, #5856D6);
      border-radius: 20px;
      margin: 0 auto 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
    }
    h1 { font-size: 22px; font-weight: 700; color: #1c1c1e; margin-bottom: 6px; }
    .meta { font-size: 14px; color: #8e8e93; margin-bottom: 8px; }
    .notes {
      font-size: 13px; color: #3a3a3c;
      background: #f2f2f7; border-radius: 10px;
      padding: 12px 16px; margin: 20px 0;
      text-align: left; line-height: 1.5;
    }
    .btn-install {
      display: block; width: 100%;
      background: #007AFF; color: #fff;
      text-decoration: none; font-size: 17px;
      font-weight: 600; padding: 16px;
      border-radius: 14px; margin-bottom: 12px;
    }
    /* .btn-download {
      display: block; width: 100%;
      background: #f2f2f7; color: #007AFF;
      text-decoration: none; font-size: 15px;
      font-weight: 500; padding: 13px;
      border-radius: 14px;
    } */
    .tip {
      font-size: 12px; color: #aeaeb2;
      margin-top: 20px; line-height: 1.6;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #1c1c1e; }
      .card { background: #2c2c2e; box-shadow: none; }
      h1 { color: #fff; }
      .notes { background: #3a3a3c; color: #ebebf5; }
      .btn-download { background: #3a3a3c; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📱</div>
    <h1>{{APP_NAME}}</h1>
    <p class="meta">Build {{VERSION}} · {{BUILD_DATE}}</p>
    <div class="notes">{{COMMIT_MSG}}</div>
    <a class="btn-install" href="{{INSTALL_URL}}">安装到 iPhone</a>
    <!-- <a class="btn-download" href="{{IPA_URL}}">下载 IPA 文件</a> -->
    <p class="tip">
      请用 Safari 打开本页面<br>
      点击安装后可以回到桌面查看安装情况<br>
      如果遇到安装失败，请确认网络状态
    </p>
  </div>
</body>
</html>
